[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
evm_version = "shanghai"
via_ir = true
optimizer = true
optimizer_runs = 200

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 1 }

[profile.test]
via_ir = true
optimizer = true
optimizer_runs = 10000
# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
